blueprint:
  name: "Lighting – No-Entry Guard (Dim then Off)"
  description: >
    After the light turns ON, wait for presence or doorway motion. If nobody
    shows up within Dim window, dim. If still nobody by Off window, turn off.
    Doorway sensor is optional; you may set it to the same entity as presence
    if desired.
  source_url: https://github.com/MagicMicky/hass-blueprints/blob/main/lighting-dim-off-no-entry.yaml
  domain: automation
  input:
    light_entity:
      name: Light (or group)
      selector:
        entity:
          domain: light
    presence_sensor:
      name: Presence / Motion inside room (binary_sensor)
      selector:
        entity:
          domain: binary_sensor
    doorway_sensor:
      name: (Optional) Doorway/Hall PIR (binary_sensor)
      default: ""
      selector:
        entity:
          domain: binary_sensor
    dim_after_min:
      name: Dim if nobody enters within (minutes)
      default: 2
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: min
          mode: slider
          step: 1
    off_after_total_min:
      name: Turn off if nobody enters within (total minutes since ON)
      default: 6
      selector:
        number:
          min: 2
          max: 120
          unit_of_measurement: min
          mode: slider
          step: 1
    dim_scene:
      name: Scene to activate for "dim" (optional; uses brightness 20% if blank)
      default: ""
      selector:
        entity:
          domain: scene
    dim_transition_sec:
      name: Dim transition (seconds)
      default: 5
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: s
          mode: slider
          step: 1

mode: restart

trigger:
  - platform: state
    entity_id: !input light_entity
    to: "on"

action:
  # Phase 0 — sensor already ON when light turns on → stop immediately
  - choose:
      - conditions:
          - condition: or
            conditions:
              - condition: state
                entity_id: !input presence_sensor
                state: "on"
              - condition: state
                entity_id: !input doorway_sensor
                state: "on"
        sequence:
          - stop: "Already occupied; skipping no-entry timeouts"

  # Phase 1 — wait up to dim_after_min for sensor to fire
  - wait_for_trigger:
      - id: "1"
        platform: state
        entity_id: !input presence_sensor
        to: "on"
      - id: "2"
        platform: state
        entity_id: !input doorway_sensor
        to: "on"
    timeout:
      minutes: !input dim_after_min
    continue_on_timeout: true

  # Phase 1b — FIX: sensor is ON right now (arrived during phase 1) → stop
  - choose:
      - conditions:
          - condition: or
            conditions:
              - condition: state
                entity_id: !input presence_sensor
                state: "on"
              - condition: state
                entity_id: !input doorway_sensor
                state: "on"
        sequence:
          - stop: "Presence confirmed after dim wait; keeping lights on"

  # Dim — nobody confirmed present yet, apply dim scene or 20%
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ dim_scene != '' }}"
        sequence:
          - service: hue.activate_scene
            data:
              transition: !input dim_transition_sec
            target:
              entity_id: !input dim_scene
    default:
      - service: light.turn_on
        target:
          entity_id: !input light_entity
        data:
          brightness_pct: 20
          transition: !input dim_transition_sec

  # Phase 2 — wait remaining (off_after_total - dim_after) minutes
  - variables:
      remaining_min: "{{ off_after_total_min - dim_after_min }}"
  - wait_for_trigger:
      - id: "3"
        platform: state
        entity_id: !input presence_sensor
        to: "on"
      - id: "4"
        platform: state
        entity_id: !input doorway_sensor
        to: "on"
    timeout:
      minutes: "{{ remaining_min }}"
    continue_on_timeout: true

  # Phase 2b — FIX: same presence check after second wait
  - choose:
      - conditions:
          - condition: or
            conditions:
              - condition: state
                entity_id: !input presence_sensor
                state: "on"
              - condition: state
                entity_id: !input doorway_sensor
                state: "on"
        sequence:
          - stop: "Presence confirmed after off wait; keeping lights on"

  # Turn off — only reaches here if nobody was detected throughout
  - choose:
      - conditions:
          - condition: state
            entity_id: !input light_entity
            state: "on"
        sequence:
          - service: light.turn_off
            target:
              entity_id: !input light_entity
